<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Water Drop Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glass Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Base Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#06b6d4" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Dark slate circular background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <circle cx="256" cy="256" r="236" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="6" />

  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#dropGrad)" stroke-width="4" stroke-opacity="0.15" />

  <!-- Main stylized water drop with shadow -->
  <g filter="url(#shadow)">
    <path d="M256,70 C256,70 380,240 380,330 C380,398.5 324.5,454 256,454 C187.5,454 132,398.5 132,330 C132,240 256,70 256,70 Z" fill="url(#dropGrad)" />
  </g>

  <!-- Glass reflection highlight on top-left of the water droplet -->
  <path d="M256,95 C256,95 345,225 345,305 C345,320 341,335 333,348 C315,280 270,180 256,120 C242,180 197,280 179,348 C171,335 167,320 167,305 C167,225 256,95 256,95 Z" fill="url(#glowGrad)" fill-opacity="0.25" />

  <!-- Inner glowing node grid center (Interstellar & Fluid theme) -->
  <circle cx="256" cy="280" r="16" fill="#ffffff" filter="drop-shadow(0px 0px 8px #22d3ee)" />
  <line x1="256" y1="280" x2="256" y2="230" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 4" stroke-opacity="0.7"/>
  <line x1="256" y1="280" x2="220" y2="310" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="256" y1="280" x2="292" y2="310" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5"/>
</svg>
